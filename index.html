
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🎮 لعبة صيد الرقم ٤</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#eef7fb;
  text-align:center;
}
header{
  background:#0b6fa4;
  color:white;
  padding:15px;
}
.game{
  background:white;
  width:90%;
  max-width:520px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
}
.items{
  font-size:40px;
  margin:15px;
}
button{
  font-size:22px;
  padding:10px 20px;
  margin:5px;
}
#result{
  font-size:24px;
  margin-top:15px;
}
#score{
  color:#ff9800;
  font-size:20px;
}
.stage{
  font-size:18px;
  color:#555;
  margin-bottom:10px;
}
canvas{
  border:2px dashed #0b6fa4;
  border-radius:10px;
  touch-action:none;
}
.hidden{
  display:none;
}
</style>
</head>

<body>

<header>
<h1>🎮 لعبة صيد الرقم ٤</h1>
<h3>مدرسة عاطوف المختلطة</h3>
<p>المعلم: محمد وجيه</p>
</header>

<div class="game">
<p class="stage" id="stage"></p>
<p id="question"></p>
<div id="items" class="items"></div>

<div id="choices"></div>

<div id="writeStage" class="hidden">
  <p>✍️ اكتب الرقم ٤ بإصبعك</p>
  <canvas id="board" width="260" height="260"></canvas><br>
  <button onclick="clearCanvas()">↺ مسح</button>
  <button onclick="finishWriting()">✅ أنهيت</button>
</div>

<p id="result"></p>
<p id="score">⭐ النقاط: ٠</p>

<button id="nextBtn" class="hidden" onclick="next()">التالي ▶</button>
</div>

<script>
/* 🔢 تحويل الأرقام إلى عربية شرقية */
function toArabicNumber(num){
  const a = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return num.toString().split('').map(d => a[d]).join('');
}

/* مراحل الدرس (مراعية للأعداد السابقة) */
const stages=[
 {t:"المرحلة "+toArabicNumber(1)+" / "+toArabicNumber(5)+" – مراجعة",
  q:"كم عدد التفاحات؟", i:"🍎🍎🍎", o:[1,2,3], a:3},

 {t:"المرحلة "+toArabicNumber(2)+" / "+toArabicNumber(5)+" – عدّ",
  q:"كم عدد الكرات؟", i:"⚽⚽⚽⚽", o:[3,4,5], a:4},

 {t:"المرحلة "+toArabicNumber(3)+" / "+toArabicNumber(5)+" – ميّز العدد",
  q:"اضغط على العدد ٤", i:"٤️⃣", o:[2,4,3], a:4},

 {t:"المرحلة "+toArabicNumber(4)+" / "+toArabicNumber(5)+" – ربط العدد بالكمية",
  q:"كم عدد العصافير؟", i:"🐦🐦🐦🐦", o:[3,4,5], a:4},

 {t:"المرحلة "+toArabicNumber(5)+" / "+toArabicNumber(5)+" – كتابة العدد ٤"}
];

const praise=["🌟 أحسنت","👏 ممتاز","🎉 رائع","✅ بطل"];
let n=0, score=0;

function load(){
 const s=stages[n];
 document.getElementById("stage").innerText=s.t;
 document.getElementById("result").innerText="";
 document.getElementById("nextBtn").classList.add("hidden");
 document.getElementById("writeStage").classList.add("hidden");
 document.getElementById("choices").innerHTML="";

 if(s.q){
  document.getElementById("question").innerText=s.q;
  document.getElementById("items").innerText=s.i;

  s.o.forEach(o=>{
    const b=document.createElement("button");
    b.innerText=toArabicNumber(o);   // ✅ عرض عربي
    b.onclick=()=>answer(o);         // ✅ منطق رقمي
    document.getElementById("choices").appendChild(b);
  });
 }else{
  document.getElementById("question").innerText="";
  document.getElementById("items").innerText="٤";
  document.getElementById("writeStage").classList.remove("hidden");
 }
}

function answer(x){
 if(x===stages[n].a){
  document.getElementById("result").innerText =
    praise[Math.floor(Math.random()*praise.length)];
  score++;
  document.getElementById("score").innerText =
    "⭐ النقاط: "+toArabicNumber(score);
  document.getElementById("nextBtn").classList.remove("hidden");
 }else{
  document.getElementById("result").innerText="❌ حاول مرة أخرى";
 }
}

function next(){
 n++;
 if(n<stages.length){
  load();
 }else{
  document.getElementById("question").innerText="🎊 أحسنت! أنهيت درس العدد ٤";
  document.getElementById("items").innerText="";
  document.getElementById("choices").innerHTML="";
  document.getElementById("nextBtn").classList.add("hidden");
 }
}

load();

/* ✍️ الرسم بالإصبع */
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
ctx.lineWidth=6;
ctx.lineCap="round";
let drawing=false;

function pos(e){
 const r=canvas.getBoundingClientRect();
 return {
  x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
  y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
 };
}
canvas.onmousedown=canvas.ontouchstart=e=>{
 drawing=true;
 const p=pos(e);
 ctx.beginPath();
 ctx.moveTo(p.x,p.y);
};
canvas.onmousemove=canvas.ontouchmove=e=>{
 if(!drawing)return;
 const p=pos(e);
 ctx.lineTo(p.x,p.y);
 ctx.stroke();
};
canvas.onmouseup=canvas.ontouchend=()=>drawing=false;

function clearCanvas(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}
function finishWriting(){
 document.getElementById("result").innerText="✅ أحسنت! كتبت الرقم ٤";
}
</script>

</body>
</html>
